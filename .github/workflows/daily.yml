name: Daily Commit

on:
  schedule:
    - cron: "0 10 * * *"   # roz 10:00 UTC (approx 3:30 PM India)
  workflow_dispatch:        # manual run ke liye

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: 23f2003724@ds.study.iitm.ac.in
        run: echo "Workflow running"

      - name: Make change
        run: |
          echo "Updated on $(date)" >> log.txt
          cat log.txt

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "23f2003724@ds.study.iitm.ac.in"
          git add .
          git diff --cached --quiet || git commit -m "Daily commit"
          git push